<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página no encontrada | Nómada</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <style>
    body{background:#F8F6F1;}
    .lang-bar{position:absolute;top:1rem;right:1rem;font-size:0.85rem}
    .lang-bar a{color:#0B2A4A;margin:0 .5rem;text-decoration:none}
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido principal</a>

  <header class="site-header">

        <span>
          <span class="brand-name">Nómada</span>
          <span class="brand-tagline">Asesoría Legal</span>
        </span>

      <div class="lang-switch">
        <a href="es/index.html">ES</a>
        <span>|</span>

      </div>

      <h1>Página no encontrada</h1>
      <p class="lead" style="max-width:560px; margin: 0 auto var(--space-5);">La página que busca no existe o ha sido movida. Le sugerimos volver a la sección principal.</p>
      <div class="btn-group" style="justify-content:center;">

    </div>

  <footer class="site-footer footer">
    <div class="container">
      <div class="footer-legal">
        <span>© <span id="year"></span> Nómada Asesoría Legal.</span>
        <div class="footer-legal-links">
          <a href="es/index.html">ES</a>
          <a href="en/index.html">EN</a>
        </div>
      </div>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</html>
